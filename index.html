<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đèn Kéo Quân - T.Nguyên</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container-3d {
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            margin-top: 50px;
        }
        .den-keo-quan {
            width: 200px;
            height: 250px;
            position: relative;
            transform-style: preserve-3d;
            animation: quayVong 10s linear infinite;
        }
        /* Dừng quay khi rê chuột vào */
        .den-keo-quan:hover {
            animation-play-state: paused;
        }
        .mat-den {
            position: absolute;
            width: 200px;
            height: 250px;
            border: 2px solid #e74c3c;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .mat-den img {
            width: 90%;
            height: 90%;
            object-fit: cover;
        }
        /* Sắp xếp 6 mặt thành vòng tròn (6 mặt = 360/6 = 60 độ mỗi mặt) */
        .mat-1 { transform: rotateY(0deg) translateZ(200px); }
        .mat-2 { transform: rotateY(60deg) translateZ(200px); }
        .mat-3 { transform: rotateY(120deg) translateZ(200px); }
        .mat-4 { transform: rotateY(180deg) translateZ(200px); }
        .mat-5 { transform: rotateY(240deg) translateZ(200px); }
        .mat-6 { transform: rotateY(300deg) translateZ(200px); }

        @keyframes quayVong {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="den-keo-quan.html">Đèn Kéo Quân</a>
    </nav>

    <header>
        <h1>Hiệu ứng Đèn Kéo Quân 3D</h1>
        <p>Rê chuột vào hình để dừng đèn lại</p>
    </header>

    <div class="container-3d">
        <div class="den-keo-quan" id="denQuan">
            <div class="mat-den mat-1"><img src="https://picsum.photos/200/250?random=1" alt="1"></div>
            <div class="mat-den mat-2"><img src="https://picsum.photos/200/250?random=2" alt="2"></div>
            <div class="mat-den mat-3"><img src="https://picsum.photos/200/250?random=3" alt="3"></div>
            <div class="mat-den mat-4"><img src="https://picsum.photos/200/250?random=4" alt="4"></div>
            <div class="mat-den mat-5"><img src="https://picsum.photos/200/250?random=5" alt="5"></div>
            <div class="mat-den mat-6"><img src="https://picsum.photos/200/250?random=6" alt="6"></div>
        </div>
    </div>
</body>
</html>
